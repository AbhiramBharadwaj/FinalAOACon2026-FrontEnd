<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1800" viewBox="0 0 1200 1800" role="img" aria-labelledby="title desc">
  <title id="title">Award Video Competition Announcement</title>
  <desc id="desc">AOACON 2026 award video competition poster</desc>
  <defs>
    <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e0845"/>
      <stop offset="100%" stop-color="#5a189a"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#c9184a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1800" fill="#fff8ee"/>
  <rect width="1200" height="370" fill="url(#hero)"/>
  <rect x="0" y="24" width="1200" height="10" fill="#fcbf49"/>
  <text x="40" y="92" fill="#ffcad4" font-family="Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="2">19TH NATIONAL CONFERENCE OF</text>
  <text x="40" y="160" fill="#ffffff" font-family="Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="2">ASSOCIATION OF OBSTETRIC ANAESTHESIOLOGISTS</text>
  <text x="40" y="220" fill="#f8f9fa" font-family="Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="2">SHIMOGA INSTITUTE OF MEDICAL SCIENCES, SHIMOGA</text>
  <line x1="40" y1="260" x2="1160" y2="260" stroke="#8d99ae" stroke-width="2"/>
  <text x="40" y="320" fill="#fcbf49" font-family="Arial, sans-serif" font-size="36" font-weight="800">30TH OCTOBER - 1ST NOVEMBER 2026</text>
  <text x="860" y="320" fill="#ffcad4" font-family="Arial, sans-serif" font-size="32" font-weight="700">SHIMOGA · KARNATAKA</text>

  <rect x="330" y="425" rx="18" ry="18" width="540" height="430" fill="#2e0845"/>
  <text x="600" y="500" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="38" font-weight="700" letter-spacing="3">AWARD</text>
  <text x="600" y="620" text-anchor="middle" fill="#ff8fab" font-family="Arial, sans-serif" font-size="88" font-weight="900" letter-spacing="4">VIDEO</text>
  <circle cx="600" cy="710" r="24" fill="#fcbf49"/>
  <polygon points="592,694 592,726 620,710" fill="#2e0845"/>
  <text x="600" y="805" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="4">COMPETITION</text>
  <rect x="420" y="815" width="360" height="42" fill="#fdf0ff"/>
  <text x="600" y="845" text-anchor="middle" fill="#2e0845" font-family="Georgia, serif" font-size="26" font-style="italic">Create. Capture. Inspire.</text>

  <rect x="60" y="910" width="1080" height="170" rx="18" fill="url(#band)"/>
  <text x="110" y="996" fill="#fff8ee" font-family="Arial, sans-serif" font-size="56" font-weight="900">5 MIN VIDEO</text>
  <text x="360" y="975" fill="#fff8ee" font-family="Arial, sans-serif" font-size="40" font-weight="700">Showcase a 5 min video of yourself performing any</text>
  <text x="360" y="1025" fill="#fff8ee" font-family="Arial, sans-serif" font-size="40" font-weight="700">procedure in Obstetric Anaesthesia, Analgesia or Critical Care.</text>

  <rect x="60" y="1110" width="340" height="240" fill="#ffffff" stroke="#5a189a" stroke-width="3"/>
  <rect x="430" y="1110" width="340" height="240" fill="#ffffff" stroke="#5a189a" stroke-width="3"/>
  <rect x="800" y="1110" width="340" height="240" fill="#ffffff" stroke="#5a189a" stroke-width="3"/>
  <text x="230" y="1185" text-anchor="middle" fill="#5a189a" font-family="Arial, sans-serif" font-size="34" font-weight="800">OPEN TO ALL</text>
  <text x="230" y="1240" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="26" font-weight="700">All delegates</text>
  <text x="230" y="1278" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="26" font-weight="700">including PGs and Fellows</text>
  <text x="600" y="1185" text-anchor="middle" fill="#5a189a" font-family="Arial, sans-serif" font-size="34" font-weight="800">VIDEO SPECS</text>
  <text x="600" y="1240" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="26" font-weight="700">720p &amp; above · Good audio</text>
  <text x="600" y="1278" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="26" font-weight="700">Max 500 MB</text>
  <text x="970" y="1185" text-anchor="middle" fill="#5a189a" font-family="Arial, sans-serif" font-size="34" font-weight="800">JUDGED ON</text>
  <text x="970" y="1240" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="26" font-weight="700">Scientific accuracy</text>
  <text x="970" y="1278" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="26" font-weight="700">Technical quality · Creativity</text>

  <rect x="60" y="1395" width="500" height="300" fill="#ffffff" stroke="#c9184a" stroke-width="3"/>
  <rect x="640" y="1395" width="500" height="300" fill="#ffffff" stroke="#5a189a" stroke-width="3"/>
  <text x="90" y="1460" fill="#c9184a" font-family="Arial, sans-serif" font-size="30" font-weight="800">WIN BIG. GET RECOGNISED.</text>
  <text x="90" y="1520" fill="#111827" font-family="Arial, sans-serif" font-size="48" font-weight="900">BEST TWO VIDEOS</text>
  <text x="90" y="1570" fill="#111827" font-family="Arial, sans-serif" font-size="28" font-weight="700">will receive exciting prizes and be played in the conference halls.</text>
  <text x="670" y="1460" fill="#5a189a" font-family="Arial, sans-serif" font-size="30" font-weight="800">IMPORTANT NOTES</text>
  <text x="670" y="1520" fill="#111827" font-family="Arial, sans-serif" font-size="26" font-weight="700">Conference registration is mandatory</text>
  <text x="670" y="1560" fill="#111827" font-family="Arial, sans-serif" font-size="26" font-weight="700">Submit with title, presenter details and description</text>
  <text x="670" y="1600" fill="#c9184a" font-family="Arial, sans-serif" font-size="30" font-weight="800">Last date: 10 October 2026</text>
  <rect x="670" y="1630" width="390" height="40" rx="12" fill="#2e0845"/>
  <text x="865" y="1657" text-anchor="middle" fill="#fcbf49" font-family="Arial, sans-serif" font-size="24" font-weight="800">UPLOAD YOUR VIDEO AT www.aoacon2026.com</text>

  <rect y="1720" width="1200" height="80" fill="#2e0845"/>
  <text x="40" y="1770" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="800">AOACON2026 · BE A PART OF THIS CELEBRATION OF EXPERTISE AND INNOVATION</text>
</svg>
